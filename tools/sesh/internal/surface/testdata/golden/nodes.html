<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sesh — nodes</title>
<script src="/assets/htmx.min.js"></script>
<style>
:root { color-scheme: light dark; }
body { font: 14px/1.45 system-ui, sans-serif; margin: 0 auto; max-width: 72rem; padding: 0 1rem 3rem; }
header.site { display: flex; gap: .6rem; align-items: baseline; padding: .8rem 0; border-bottom: 1px solid color-mix(in srgb, currentColor 20%, transparent); margin-bottom: 1rem; }
header.site a { font-weight: 700; text-decoration: none; color: inherit; }
header.site .tagline { opacity: .6; font-size: .85em; }
h2 { font-size: 1.1rem; margin: 1.2rem 0 .3rem; }
h3 { font-size: .95rem; margin: .8rem 0 .3rem; opacity: .85; }
.source, .secondary { opacity: .6; font-size: .85em; font-weight: 400; }
table.sessions { border-collapse: collapse; width: 100%; }
table.sessions td, table.sessions th { text-align: left; padding: .25rem .6rem .25rem 0; border-bottom: 1px solid color-mix(in srgb, currentColor 12%, transparent); vertical-align: baseline; }
table.sessions th { font-size: .78em; text-transform: uppercase; letter-spacing: .04em; opacity: .55; }
.badge { font-size: .75em; border: 1px solid color-mix(in srgb, currentColor 35%, transparent); border-radius: .6em; padding: 0 .45em; margin-left: .4em; opacity: .8; white-space: nowrap; }
.badge.warn { border-color: #b8860b; color: #b8860b; }
code, pre { font: .86em/1.4 ui-monospace, monospace; }
pre { white-space: pre-wrap; overflow-wrap: anywhere; margin: .2rem 0; }
ol.transcript, ol.rawlines { list-style: none; padding: 0; }
li.entry { border-left: 3px solid color-mix(in srgb, currentColor 15%, transparent); padding: .3rem 0 .3rem .7rem; margin: .35rem 0; }
li.entry.role-user { border-left-color: #4a7dbd; }
li.entry.role-assistant { border-left-color: #4aa564; }
li.entry.quarantined { border-left-color: #b8860b; }
.entryhead { font-size: .8em; opacity: .75; display: flex; gap: .7em; flex-wrap: wrap; }
.entryhead .role { font-weight: 700; text-transform: uppercase; letter-spacing: .03em; }
.block.meta { opacity: .55; font-size: .82em; }
.block .btitle { font-size: .82em; font-weight: 600; opacity: .8; margin-top: .25rem; }
details.block { margin: .2rem 0; }
details.block > summary { cursor: pointer; font-size: .84em; opacity: .75; }
li.rawline { padding: .1rem 0; border-bottom: 1px dotted color-mix(in srgb, currentColor 10%, transparent); }
p.crumbs { font-size: .85em; }
p.notice { border: 1px solid color-mix(in srgb, currentColor 30%, transparent); border-radius: .3rem; padding: .4rem .7rem; background: color-mix(in srgb, currentColor 6%, transparent); }
.empty { opacity: .6; }
dl.meta { font-size: .85em; display: grid; grid-template-columns: max-content 1fr; gap: .1rem 1rem; }
dl.meta dt { opacity: .6; }
dl.meta dd { margin: 0; }
</style>
</head>
<body>
<header class="site"><a href="/">sesh</a><a href="/sessions">sessions</a><span class="tagline">team session mirror — read-only</span></header>
<main>

<h1>Nodes</h1>
<table class="sessions">
  <thead><tr><th>Node</th><th>Last PUT</th><th>Age</th><th>Status</th><th>Sessions</th></tr></thead>
  <tbody>
  
    <tr>

      <td><span class="badge">fresh</span></td>

    </tr>
  
  </tbody>
</table>

</main>
</body>
</html>
